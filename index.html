<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sexta-Feira | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background: #020617; }
        .duo-input { border: 2px solid #334155; border-bottom: 5px solid #334155; border-radius: 12px; background: #1e293b; color: white; padding: 12px; width: 100%; outline: none; }
        .btn-login { background: #1CB0F6; border-bottom: 5px solid #1899D6; color: white; border-radius: 12px; font-weight: 900; width: 100%; padding: 15px; margin-top: 20px; }
        .btn-login:active { border-bottom-width: 0px; transform: translateY(4px); }
        .hidden { display: none; }
    </style>
</head>
<body class="flex items-center justify-center h-screen p-6">

    <div id="loginPage" class="w-full max-w-sm text-center">
        <h1 class="text-4xl font-black text-white mb-2 tracking-tighter">SEXTA-FEIRA</h1>
        <p class="text-blue-400 font-bold text-xs tracking-widest mb-10 uppercase">AeT Studios System</p>
        
        <input type="text" id="username" placeholder="Seu Nome de Usuário" class="duo-input mb-4">
        <button onclick="fazerLogin()" class="btn-login">ENTRAR NO SISTEMA</button>
    </div>

    <div id="mainPage" class="hidden w-full h-full max-w-4xl bg-white rounded-3xl overflow-hidden flex flex-col shadow-2xl">
        <header class="p-4 bg-white border-b-2 flex justify-between items-center">
            <h2 class="font-black text-[#1CB0F6]">DASHBOARD</h2>
            <span id="userDisplay" class="font-bold text-gray-400"></span>
        </header>
        
        <main class="flex-1 p-6">
            <div class="bg-blue-50 p-4 rounded-2xl border-2 border-blue-100 mb-6">
                <p class="font-black text-blue-600">SISTEMA ATIVO</p>
                <p class="text-sm text-blue-400">Suas informações estão sendo salvas no Firebase.</p>
            </div>

            <h3 class="font-black text-gray-700 mb-4 uppercase text-xs tracking-widest">Adicionar Amigos</h3>
            <div class="flex gap-2 mb-10">
                <input type="text" id="friendName" placeholder="Nome do amigo..." class="flex-1 border-2 p-2 rounded-xl outline-none border-gray-100">
                <button onclick="addAmigo()" class="bg-[#1CB0F6] text-white px-4 rounded-xl font-black">ADD</button>
            </div>

            <h3 class="font-black text-gray-700 mb-4 uppercase text-xs tracking-widest">Meus Amigos</h3>
            <div id="listaAmigos" class="space-y-2"></div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBAs3irtV6MuTPHmsxYwYSFMTkX6_6ntz8",
            projectId: "sexta-feira-fb01a",
            appId: "1:82809140147:web:2a3f3ece3e81c33b0b91c6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // LOGIN E GUARDAR INFO
        window.fazerLogin = async () => {
            const user = document.getElementById('username').value;
            if(!user) return alert("Digite um nome!");
            
            // Salva o usuário no banco para não ser "enfeite"
            await setDoc(doc(db, "usuarios", user), { nome: user, online: true });
            localStorage.setItem("user_sextafeita", user);
            
            mostrarDashboard(user);
        };

        function mostrarDashboard(user) {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainPage').classList.remove('hidden');
            document.getElementById('userDisplay').innerText = "@" + user;
            carregarAmigos(user);
        }

        // ADICIONAR AMIGO
        window.addAmigo = async () => {
            const amigo = document.getElementById('friendName').value;
            const meuUser = localStorage.getItem("user_sextafeita");
            if(!amigo) return;

            await addDoc(collection(db, "amigos"), {
                de: meuUser,
                para: amigo,
                status: "aceito"
            });
            document.getElementById('friendName').value = "";
        };

        // LISTAR AMIGOS EM TEMPO REAL
        function carregarAmigos(meuUser) {
            const q = query(collection(db, "amigos"), where("de", "==", meuUser));
            onSnapshot(q, (snap) => {
                const lista = document.getElementById('listaAmigos');
                lista.innerHTML = "";
                snap.forEach(doc => {
                    lista.innerHTML += `
                        <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border-2 border-gray-100">
                            <span class="font-bold">👤 ${doc.data().para}</span>
                            <span class="text-[10px] bg-green-100 text-green-600 px-2 py-1 rounded-full font-black">AMIGO</span>
                        </div>
                    `;
                });
            });
        }

        // Checar se já estava logado
        const jaLogado = localStorage.getItem("user_sextafeita");
        if(jaLogado) mostrarDashboard(jaLogado);
    </script>
</body>
</html>
