<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sexta-Feira | AeT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap" rel="stylesheet">
    <style>
        /* CSS inline pra carregar antes de tudo e não dar tela branca */
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .splash { position: fixed; inset: 0; background: #020617; z-index: 100; display: flex; align-items: center; justify-center; }
        .btn-active:active { transform: scale(0.95); transition: 0.1s; }
    </style>
</head>
<body>

    <div id="splash" class="fixed inset-0 bg-[#020617] z-[100] flex flex-col items-center justify-center">
        <h1 class="text-4xl font-black text-white tracking-tighter animate-pulse">SEXTA-FEIRA</h1>
        <p class="text-blue-500 text-[10px] font-bold tracking-[4px] mt-2">AET STUDIOS</p>
    </div>

    <div id="app" class="opacity-0 transition-opacity duration-500">
        <header class="p-4 bg-white border-b flex justify-between items-center sticky top-0 z-50">
            <span class="font-black text-blue-600">SEXTA-FEIRA</span>
            <div class="flex gap-2">
                <span class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-xs font-bold">🟡 1.250</span>
            </div>
        </header>

        <main class="p-4 max-w-lg mx-auto pb-24">
            <div id="feed" class="space-y-4">
                <div class="bg-white p-4 rounded-2xl border-2 border-gray-100 shadow-sm">
                    <p class="text-gray-400 text-xs font-bold uppercase mb-1">Sistema</p>
                    <p class="font-bold text-gray-700">Bem-vindo à nova rede da AeT Studios. O motor Gemini está pronto.</p>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 inset-x-0 bg-white border-t flex justify-around p-4 shadow-lg">
            <button class="text-2xl btn-active">🏠</button>
            <button class="text-2xl btn-active opacity-30">💬</button>
            <button class="text-2xl btn-active opacity-30">➕</button>
            <button class="text-2xl btn-active opacity-30">👥</button>
        </nav>
    </div>

    <script>
        // Remove a splash screen assim que o documento carregar
        window.onload = () => {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('app').classList.remove('opacity-0');
        };
    </script>
</body>
</html>
